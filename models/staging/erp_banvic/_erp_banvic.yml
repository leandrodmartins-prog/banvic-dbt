
sources:
  - name: erp
    description: Este é um sistema ERP da Banvic
    schema: erp_banvic
    tables:
      - name: localidades
        description: Tabela que registra as informações de cidade e estado
        columns:
          - name: cod_localidade
            description: Chave primária da tabela localidades
            data_tests:
              - unique
              - not_null
              
      - name: clientes
        description: Tabela que armazena os dados dos clientes
        columns:
          - name: cod_cliente
            description: Chave primária da tabela clientes
            data_tests:
              - unique
              - not_null

      - name: colaboradores
        description: Tabela que armazena os dados dos colaboradores
        columns:
          - name: cod_colaborador
            description: Chave primária da tabela colaboradores
            data_tests:
              - unique
              - not_null

      - name: agencias
        description: Tabela que armazena os dados das agências
        columns:
          - name: cod_agencia
            description: Chave primária da tabela agencias
            data_tests:
              - unique
              - not_null
      - name: colaborador_agencia
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - cod_colaborador
                  - cod_agencia